<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Desktop wireframe">
    <style>
        .stroke{stroke:#14365e;stroke-width:1.5;fill:#ffffff}
        .placeholder{stroke:#5b6471;stroke-width:1;fill:#f0f0f0}
        .label{font-family:'Open Sans',Arial,sans-serif;font-size:12px;fill:#1a1a1a}
        .label-bold{font-family:'Open Sans',Arial,sans-serif;font-size:13px;font-weight:700;fill:#14365e}
        .dark{fill:#14365e}
        .light{fill:#efe1ad}
        .x{stroke:#5b6471;stroke-width:1}
    </style>

    <rect x="0" y="0" width="900" height="600" fill="#fafafa"/>

    <!-- Header -->
    <rect class="stroke" x="20" y="20" width="860" height="50"/>
    <rect class="placeholder" x="35" y="32" width="26" height="26"/>
    <text class="label-bold" x="75" y="50">Kyiv Chamber of Commerce</text>
    <text class="label" x="640" y="50">Home</text>
    <text class="label" x="680" y="50">Directory</text>
    <text class="label" x="735" y="50">Join</text>
    <text class="label" x="770" y="50">Discover</text>
    <circle cx="855" cy="45" r="8" class="dark"/>

    <!-- Hero -->
    <rect class="placeholder" x="20" y="85" width="860" height="180"/>
    <line class="x" x1="20" y1="85" x2="880" y2="265"/>
    <line class="x" x1="880" y1="85" x2="20" y2="265"/>
    <text class="label" x="395" y="180">scalable, responsive hero image</text>
    <rect class="dark" x="770" y="225" width="100" height="30"/>
    <text class="label" x="785" y="245" fill="#ffffff">Keynote Tickets</text>

    <!-- H1 -->
    <text class="label-bold" x="20" y="295" font-size="18">Home</text>

    <!-- Events / Weather / Forecast -->
    <rect class="dark" x="20" y="310" width="380" height="22"/>
    <text class="label" x="35" y="325" fill="#ffffff">Events</text>
    <rect class="stroke" x="20" y="332" width="380" height="100"/>

    <rect class="dark" x="410" y="310" width="220" height="22"/>
    <text class="label" x="425" y="325" fill="#ffffff">Current Weather</text>
    <rect class="stroke" x="410" y="332" width="220" height="100"/>
    <text class="label" x="425" y="355">75 F  Party Cloudy</text>
    <text class="label" x="425" y="372">High: 85  Low: 52</text>
    <text class="label" x="425" y="389">Humidity: 34%</text>
    <text class="label" x="425" y="406">Sunrise: 7:30am</text>
    <text class="label" x="425" y="423">Sunset: 9:59pm</text>

    <rect class="dark" x="640" y="310" width="220" height="22"/>
    <text class="label" x="655" y="325" fill="#ffffff">Weather Forecast</text>
    <rect class="stroke" x="640" y="332" width="220" height="100"/>
    <text class="label" x="655" y="355">Today: 90 F</text>
    <text class="label" x="655" y="375">Wednesday: 89 F</text>
    <text class="label" x="655" y="395">Thursday: 68 F</text>

    <!-- Business cards -->
    <rect class="stroke" x="20" y="450" width="270" height="110"/>
    <text class="label-bold" x="105" y="468">Business Name</text>
    <text class="label" x="115" y="483">Business Tag Line</text>
    <rect class="placeholder" x="35" y="495" width="60" height="55"/>
    <line class="x" x1="35" y1="495" x2="95" y2="550"/>
    <line class="x" x1="95" y1="495" x2="35" y2="550"/>
    <text class="label" x="105" y="510">EMAIL: info@gmail.com</text>
    <text class="label" x="105" y="525">PHONE: 800-555-1234</text>
    <text class="label" x="105" y="540">URL: mybusiness.com</text>

    <rect class="stroke" x="315" y="450" width="270" height="110"/>
    <text class="label-bold" x="400" y="468">Business Name</text>
    <text class="label" x="410" y="483">Business Tag Line</text>
    <rect class="placeholder" x="330" y="495" width="60" height="55"/>
    <line class="x" x1="330" y1="495" x2="390" y2="550"/>
    <line class="x" x1="390" y1="495" x2="330" y2="550"/>
    <text class="label" x="400" y="510">EMAIL: info@gmail.com</text>
    <text class="label" x="400" y="525">PHONE: 800-555-1234</text>
    <text class="label" x="400" y="540">URL: mybusiness.com</text>

    <rect class="stroke" x="610" y="450" width="270" height="110"/>
    <text class="label-bold" x="695" y="468">Business Name</text>
    <text class="label" x="705" y="483">Business Tag Line</text>
    <rect class="placeholder" x="625" y="495" width="60" height="55"/>
    <line class="x" x1="625" y1="495" x2="685" y2="550"/>
    <line class="x" x1="685" y1="495" x2="625" y2="550"/>
    <text class="label" x="695" y="510">EMAIL: info@gmail.com</text>
    <text class="label" x="695" y="525">PHONE: 800-555-1234</text>
    <text class="label" x="695" y="540">URL: mybusiness.com</text>

    <!-- Footer -->
    <rect class="stroke" x="0" y="572" width="900" height="28" fill="#14365e"/>
    <text class="label" x="20" y="591" fill="#ffffff">Kyiv Chamber - WDD 231 - Dmytro Ivanytskyi</text>
</svg>
