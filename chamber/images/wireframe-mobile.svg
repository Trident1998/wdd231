<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" role="img" aria-label="Mobile wireframe">
    <style>
        .stroke{stroke:#14365e;stroke-width:1.5;fill:#ffffff}
        .placeholder{stroke:#5b6471;stroke-width:1;fill:#f0f0f0}
        .label{font-family:'Open Sans',Arial,sans-serif;font-size:11px;fill:#1a1a1a}
        .label-bold{font-family:'Open Sans',Arial,sans-serif;font-size:12px;font-weight:700;fill:#14365e}
        .dark{fill:#14365e}
        .x{stroke:#5b6471;stroke-width:1}
    </style>

    <rect x="0" y="0" width="360" height="640" fill="#fafafa"/>

    <!-- Phone frame -->
    <rect x="10" y="10" width="340" height="620" rx="18" fill="#ffffff" stroke="#14365e" stroke-width="2"/>

    <!-- Status bar -->
    <text class="label" x="30" y="32">9:41</text>
    <text class="label" x="305" y="32">100%</text>

    <!-- Header -->
    <rect class="stroke" x="20" y="45" width="320" height="44"/>
    <rect class="placeholder" x="30" y="54" width="22" height="22"/>
    <text class="label-bold" x="60" y="70">Kyiv Chamber</text>
    <text class="label-bold" x="60" y="83">of Commerce</text>
    <circle cx="290" cy="67" r="7" class="dark"/>
    <rect class="dark" x="310" y="55" width="20" height="3"/>
    <rect class="dark" x="310" y="63" width="20" height="3"/>
    <rect class="dark" x="310" y="71" width="20" height="3"/>

    <!-- Hero -->
    <rect class="placeholder" x="20" y="100" width="320" height="80"/>
    <line class="x" x1="20" y1="100" x2="340" y2="180"/>
    <line class="x" x1="340" y1="100" x2="20" y2="180"/>
    <rect class="dark" x="230" y="155" width="100" height="22"/>
    <text class="label" x="245" y="170" fill="#ffffff">Keynote Tickets</text>

    <!-- H1 -->
    <text class="label-bold" x="20" y="205" font-size="14">Home</text>

    <!-- Events -->
    <rect class="dark" x="20" y="215" width="320" height="22"/>
    <text class="label" x="35" y="230" fill="#ffffff">Events</text>
    <rect class="stroke" x="20" y="237" width="320" height="60"/>

    <!-- Weather -->
    <rect class="dark" x="20" y="310" width="320" height="22"/>
    <text class="label" x="35" y="325" fill="#ffffff">Current Weather</text>
    <rect class="stroke" x="20" y="332" width="320" height="90"/>
    <text class="label" x="35" y="352">75 F   Party Cloudy</text>
    <text class="label" x="35" y="368">High: 85   Low: 52</text>
    <text class="label" x="35" y="384">Humidity: 34%</text>
    <text class="label" x="35" y="400">Sunrise: 7:30am</text>
    <text class="label" x="35" y="416">Sunset: 9:59pm</text>

    <!-- Forecast -->
    <rect class="dark" x="20" y="435" width="320" height="22"/>
    <text class="label" x="35" y="450" fill="#ffffff">Weather Forecast</text>
    <rect class="stroke" x="20" y="457" width="320" height="80"/>
    <text class="label" x="35" y="478">Today: 90 F</text>
    <text class="label" x="35" y="498">Wednesday: 89 F</text>
    <text class="label" x="35" y="518">Thursday: 68 F</text>

    <!-- Footer band -->
    <rect class="stroke" x="20" y="555" width="320" height="55" fill="#14365e"/>
    <text class="label" x="35" y="575" fill="#ffffff">Kyiv Chamber of Commerce</text>
    <text class="label" x="35" y="590" fill="#ffffff">WDD 231 - Dmytro Ivanytskyi</text>
    <text class="label" x="35" y="605" fill="#ffffff">2025 - Kyiv, Ukraine</text>
</svg>
